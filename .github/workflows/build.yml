name: Build Resignation Delete

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows (MSVC)
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        key: windows-msvc
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: resignation-delete-windows
        path: target/release/resignation-delete.exe
        retention-days: 90

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        key: linux
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: resignation-delete-linux
        path: target/release/resignation-delete
        retention-days: 90

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        key: macos
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: resignation-delete-macos
        path: target/release/resignation-delete
        retention-days: 90
