name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows (MSVC)
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        key: windows-msvc
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Create output directory
      run: New-Item -ItemType Directory -Force -Path output | Out-Null
    
    - name: Copy binary
      run: Copy-Item target/release/resignation_delete.exe output/resignation-delete.exe
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: resignation-delete-windows
        path: output/resignation-delete.exe
        retention-days: 90

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        key: linux
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Create output directory
      run: mkdir -p output
    
    - name: Copy binary
      run: cp target/release/resignation_delete output/resignation-delete
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: resignation-delete-linux
        path: output/resignation-delete
        retention-days: 90

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        key: macos
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Create output directory
      run: mkdir -p output
    
    - name: Copy binary
      run: cp target/release/resignation_delete output/resignation-delete
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: resignation-delete-macos
        path: output/resignation-delete
        retention-days: 90

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: resignation-delete-windows
        path: release-files
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: resignation-delete-linux
        path: release-files
    
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: resignation-delete-macos
        path: release-files
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: "Release ${{ github.ref_name }}"
        tag_name: v${{ github.run_number }}
        files: release-files/*
        body: |
          ## Resignation Delete - 离职数据清理工具
          
          自动编译版本，支持以下平台：
          
          - **Windows**: `resignation-delete.exe`
          - **Linux**: `resignation-delete`
          - **macOS**: `resignation-delete`
          
          ## 使用说明
          
          1. 下载对应平台的可执行文件
          2. 运行程序
          3. 点击"扫描系统"查找可清理的数据项
          4. 选择要清除的项目，点击"清除选中项"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
